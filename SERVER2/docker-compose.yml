version: "3.9"

services:
  # ─────────────────────────────────────────────
  # Eclipse Mosquitto MQTT Broker
  # TCP: 1883  |  WebSocket: 9001
  # ─────────────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: telemetry-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    networks:
      - telemetry-net

  # ─────────────────────────────────────────────
  # TimescaleDB (PostgreSQL 15 tabanlı)
  # Port: 5432
  # ─────────────────────────────────────────────
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: telemetry-timescaledb
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: telemetry_user
      POSTGRES_PASSWORD: telemetry_pass
      POSTGRES_DB: telemetry_db
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
      - timescaledb_data:/var/lib/postgresql/data
    networks:
      - telemetry-net

  # ─────────────────────────────────────────────
  # FastAPI Backend
  # Port: 8000
  # ─────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: telemetry-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MQTT_BROKER_HOST: mosquitto
      MQTT_BROKER_PORT: 1883
      MQTT_TOPIC: "telemetry/car1"
      MQTT_KEEPALIVE: 60
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_NAME: telemetry_db
      DB_USER: telemetry_user
      DB_PASSWORD: telemetry_pass
    depends_on:
      - mosquitto
      - timescaledb
    networks:
      - telemetry-net

volumes:
  mosquitto_data:
  mosquitto_log:
  timescaledb_data:

networks:
  telemetry-net:
    driver: bridge
