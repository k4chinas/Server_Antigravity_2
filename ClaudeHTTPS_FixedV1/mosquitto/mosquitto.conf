# ─────────────────────────────────────────────
# Eclipse Mosquitto — Konfigürasyon
# ─────────────────────────────────────────────

# Kalıcılık (persistence) ayarı
persistence true
persistence_location /mosquitto/data/

# Log ayarları
log_dest file /mosquitto/log/mosquitto.log
log_type all

# ─────────────────────────────────────────────
# TCP Listener (STM32 / SIM800C + Backend)
# ─────────────────────────────────────────────
listener 1883
protocol mqtt

# ─────────────────────────────────────────────
# WebSocket Listener (React Dashboard)
# ─────────────────────────────────────────────
listener 9001
protocol websockets

# Anonim erişim (DEV ortamı için)
allow_anonymous true
