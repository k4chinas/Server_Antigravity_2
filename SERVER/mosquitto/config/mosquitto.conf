# =============================================================================
# Eclipse Mosquitto — MQTT Broker Konfigürasyonu
# =============================================================================

# ---- Listener -----------------------------------------------------------
listener 1883
protocol mqtt

# ---- Kimlik Doğrulama (Geliştirme Ortamı) --------------------------------
# NOT: Üretim ortamında anonim erişimi kapatıp kullanıcı/şifre veya TLS
#      sertifikası kullanılmalıdır.
allow_anonymous true

# ---- Persistence ---------------------------------------------------------
persistence true
persistence_location /mosquitto/data/

# ---- Loglama -------------------------------------------------------------
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
connection_messages true
log_timestamp true
